<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serenity — Yoga, Breathwork & Meditation with Varun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C4614A;
      --gold:       #C9A96E;
      --cream:      #FAF5EE;
      --dark:       #2C1A10;
      --mid:        #6B4C35;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --sans:       'Lato', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(196,97,74,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,169,110,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem 6rem;
      position: relative;
      z-index: 1;
      gap: 0;
    }

    /* ── Logo mark ── */
    .logo-mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.2s ease forwards;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 1s 0.4s ease forwards;
    }

    /* ── Headline ── */
    h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(2.4rem, 6vw, 4rem);
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 1s 0.6s ease forwards;
    }

    h1 em { font-style: italic; color: var(--gold); }

    /* ── Subtext ── */
    .sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: rgba(250,245,238,0.6);
      line-height: 1.9;
      max-width: 460px;
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeUp 1s 0.8s ease forwards;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeIn 1s 1s ease forwards;
    }

    /* ── Status ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(250,245,238,0.45);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s 1.1s ease forwards;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--terracotta);
      flex-shrink: 0;
      animation: pulse 2.5s infinite;
    }

    /* ── CTA buttons ── */
    .ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1s 1.3s ease forwards;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2rem;
      border: 1px solid rgba(201,169,110,0.4);
      color: var(--gold);
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .btn:hover {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold);
      color: var(--cream);
    }

    .btn-wa {
      background: rgba(37,211,102,0.08);
      border-color: rgba(37,211,102,0.35);
      color: #25d366;
    }

    .btn-wa:hover {
      background: rgba(37,211,102,0.15);
      border-color: #25d366;
      color: #25d366;
    }

    /* ── Note ── */
    .note {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: rgba(250,245,238,0.25);
      opacity: 0;
      animation: fadeIn 1s 1.6s ease forwards;
    }

    /* ── Footer ── */
    .foot {
      position: fixed;
      bottom: 1.8rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(250,245,238,0.15);
      opacity: 0;
      animation: fadeIn 1.2s 2s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      .ctas { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
    }
  </style>
</head>

</body>
